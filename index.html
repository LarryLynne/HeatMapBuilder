<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heatmap Builder Pro</title>
    
    <!-- CSS библиотеки -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Наш собственный стиль -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Верхняя панель -->
    <header id="topbar">
        <div class="logo">🔥 Heatmap Pro</div>
        <div class="top-controls">
            <div class="file-upload-wrapper">
                <label for="fileInput" class="btn btn-upload" id="uploadLabel">📂 Загрузить Excel / CSV</label>
                <input type="file" id="fileInput" accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, application/vnd.ms-excel" />
            </div>
            
            <button id="settingsBtn" class="btn btn-settings">⚙️ Настройки карты</button>
            <button id="snapBtn" class="btn btn-export">📸 Скачать (.png)</button>
        </div>
    </header>

    <!-- Основная рабочая область -->
    <main id="workspace">
        <!-- Левая панель (ТОЛЬКО ФИЛЬТРЫ) -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <h3>🔍 Фильтры данных</h3>
                <div id="status" class="status-badge">Нет данных</div>
            </div>
            
            <div id="dynamicSlicers" class="slicers-wrapper">
                <div class="empty-state">Загрузите файл, чтобы здесь появились срезы для фильтрации</div>
            </div>
        </aside>

        <!-- Карта -->
        <div id="map"></div>
    </main>

    <!-- 1. Модальное (плавающее) окно настроек тепловой карты -->
    <div id="settingsModal" class="floating-window" style="display: none; top: 80px; right: 20px;">
        <div class="window-header" id="settingsHeader">
            <span>⚙️ Настройки тепловой карты</span>
            <button class="btn-close" onclick="document.getElementById('settingsModal').style.display='none'">✖</button>
        </div>
        <div class="window-body">
            <div class="control-group">
                <div class="slider-label">Цветовая схема</div>
                <select id="gradientSelect">
                    <option value="default">🌈 Стандарт (Радуга)</option>
                    <option value="fire">🔥 Огонь (Черный-Красный)</option>
                    <option value="deepblue">🌊 Глубина (Синий-Бирюзовый)</option>
                    <option value="toxic">☣️ Токсик (Зеленый-Лайм)</option>
                    <option value="sunrise">🌅 Рассвет (Пурпур-Золото)</option>
                </select>
            </div>
            
            <div class="control-group" style="margin-top: 15px;">
                <div class="slider-label"><span>Радиус точки</span><span id="radiusVal" class="slider-val">25</span></div>
                <input type="range" id="radiusRange" min="5" max="80" value="25">
                
                <div class="slider-label" style="margin-top: 15px;"><span>Размытие</span><span id="blurVal" class="slider-val">15</span></div>
                <input type="range" id="blurRange" min="1" max="60" value="15">
                
                <div class="slider-label" style="margin-top: 15px;"><span>Чувствительность</span><span id="maxVal" class="slider-val">1.0</span></div>
                <input type="range" id="maxRange" min="0.1" max="5" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <!-- 2. Модальное (плавающее) окно результатов выделения зоны -->
    <div id="zoneModal" class="floating-window zone-window" style="display: none; top: 150px; left: 380px;">
        <div class="window-header" id="zoneHeader">
            <span>📍 Анализ выделенной зоны</span>
            <button class="btn-close" id="clearZoneBtn">✖</button>
        </div>
        <div class="window-body">
            <div class="zone-total" id="zoneTotalVal">Сумма: 0</div>
            <div class="zone-list" id="zoneListContainer"></div>
        </div>
    </div>

    <!-- JS библиотеки -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/leaflet-simple-map-screenshoter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>
    
    <!-- Наш собственный скрипт -->
    <script src="script.js"></script>
</body>
</html>
